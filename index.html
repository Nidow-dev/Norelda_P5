<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Prototype Logistique</title>

<style>
body { margin:0; font-family:Arial; background:#1e1e1e; color:white; }

canvas { background:#2b2b2b; display:block; margin:0 auto; }

#game { display:none; }

#menu {
  position:fixed;
  inset:0;
  background:#111;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:15px;
}

button {
  padding:10px 15px;
  cursor:pointer;
  border:none;
  border-radius:6px;
}

.colorBtn {
  width:120px;
}

#ui {
  position:fixed;
  top:10px;
  left:10px;
  background:#0008;
  padding:10px;
  border-radius:8px;
}
</style>

</head>
<body>

<!-- 🎮 MENU -->
<div id="menu">
  <h1>Norelda Roads</h1>

  <p>Choisis ton camion :</p>

  <div>
    <button class="colorBtn" onclick="selectColor('red')" style="background:red;">Rouge</button>
    <button class="colorBtn" onclick="selectColor('blue')" style="background:blue;">Bleu</button>
    <button class="colorBtn" onclick="selectColor('green')" style="background:green;">Vert</button>
  </div>

  <p>
    🎮 Contrôles :<br>
    Flèches = déplacer<br>
    ESPACE = action (acheter / livrer)
  </p>

  <button onclick="startGame()" style="background:#4caf50;">▶ PLAY</button>
</div>

<!-- 🎮 UI IN-GAME -->
<div id="ui">
  💰 Argent: <span id="money">0</span><br>
  🌾 Blé: <span id="wheat">0</span><br>
  🚚 Capacité: <span id="cap">5</span>
</div>

<canvas id="game" width="800" height="500"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let keys = {};
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

// 🚚 camion
let truck = {
  x: 100,
  y: 100,
  speed: 2,
  maxCargo: 5,
  cargo: 0,
  color: "red"
};

// 💰 joueur
let money = 100;

// 📦 STOCK GLOBAL (ton dépôt)
let storage = {
  wheat: 0
};

// 🏪 FOURNISSEUR (achat)
const supplier = { x: 100, y: 100 };

// 🏠 DÉPÔT (stockage)
const depot = { x: 400, y: 250 };

// 🏙️ CLIENT (livraison)
const client = { x: 650, y: 350 };

// 🎨 sélection couleur
function selectColor(color){
  truck.color = color;
}

// ▶ démarrer jeu
function startGame(){
  document.getElementById("menu").style.display = "none";
  canvas.style.display = "block";
  loop();
}

// UI
function updateUI(){
  document.getElementById("money").textContent = money;
  document.getElementById("wheat").textContent = storage.wheat;
  document.getElementById("cap").textContent = truck.maxCargo;
}

// distance
function isNear(a,b){
  return Math.hypot(a.x-b.x, a.y-b.y) < 40;
}

// 🎮 UPDATE
function update(){

  // déplacement
  if(keys["ArrowUp"]) truck.y -= truck.speed;
  if(keys["ArrowDown"]) truck.y += truck.speed;
  if(keys["ArrowLeft"]) truck.x -= truck.speed;
  if(keys["ArrowRight"]) truck.x += truck.speed;

  // 🏪 ACHAT au fournisseur
  if(isNear(truck, supplier)){
    if(keys[" "]){
      let price = 2;

      if(money >= price && truck.cargo < truck.maxCargo){
        money -= price;
        truck.cargo += 1;
      }
    }
  }

  // 🏠 DÉPÔT (vider camion → stock)
  if(isNear(truck, depot)){
    if(keys[" "]){
      storage.wheat += truck.cargo;
      truck.cargo = 0;
    }
  }

  // 🏙️ LIVRAISON client
  if(isNear(truck, client)){
    if(keys[" "]){
      if(storage.wheat > 0){
        storage.wheat -= 1;
        money += 10;
      }
    }
  }

  updateUI();
}

// 🎨 DRAW
function draw(){
  ctx.clearRect(0,0,800,500);

  // fournisseur
  ctx.fillStyle="green";
  ctx.fillRect(supplier.x-20, supplier.y-20, 40,40);
  ctx.fillText("Fournisseur", supplier.x-40, supplier.y-30);

  // dépôt
  ctx.fillStyle="orange";
  ctx.fillRect(depot.x-20, depot.y-20, 40,40);
  ctx.fillText("Dépôt", depot.x-30, depot.y-30);

  // client
  ctx.fillStyle="blue";
  ctx.fillRect(client.x-20, client.y-20, 40,40);
  ctx.fillText("Client", client.x-25, client.y-30);

  // camion
  ctx.fillStyle = truck.color;
  ctx.fillRect(truck.x-10, truck.y-10, 20,20);
}

// loop
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

</script>

</body>
</html>
