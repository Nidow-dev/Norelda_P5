<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Norelda Roads</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<!-- 🎮 MENU -->
<div id="menu">
  <h1>Norelda Roads</h1>

  <p>Choisis ton camion :</p>

<div class="colorContainer">

  <button id="redBtn"
  class="colorBtn"
  onclick="selectColor('red')"
  style="background:red;">
  Rouge
  </button>

  <button id="blueBtn"
  class="colorBtn"
  onclick="selectColor('blue')"
  style="background:blue;">
  Bleu
  </button>

  <button id="greenBtn"
  class="colorBtn"
  onclick="selectColor('green')"
  style="background:green;">
  Vert
  </button>

  <p>
    🎮 Contrôles :<br>
    Flèches = déplacer<br>
    ESPACE = action (acheter / livrer)
  </p>

  <button onclick="startGame()" style="background:#4caf50;">▶ PLAY</button>
</div>

<!-- 🎮 UI IN-GAME -->
<div id="ui">
  💰 Argent: <span id="money">0</span><br>
  🌾 Blé: <span id="wheat">0</span><br>
  🚚 Capacité: <span id="cap">5</span>
</div>

<canvas id="game" width="800" height="500"></canvas>

<script src="game.js"></script>

</body>
</html>
